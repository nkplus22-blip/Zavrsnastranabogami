<!doctype html>
<html lang="bs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kontakt | YuGo Family TV</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  
  <!-- Uključujemo CSS iz tvog index.html šablona -->
  <style>
    /* Ovdje se nalazi isti CSS iz tvog index.html šablona */
    :root { --bg: #03050d; --bg2: #070c24; --panel: rgba(255, 255, 255, 0.04); --border: rgba(255, 255, 255, 0.09); --text: #f1f7fc; --muted: rgba(210, 230, 255, 0.65); --neon: #2ac0ff; --accent: #4a6bff; --radius2: 26px; }
    body { margin: 0; font-family: 'Inter', sans-serif; color: var(--text); background-color: var(--bg); background-image: linear-gradient(180deg, var(--bg2), var(--bg)); min-height: 100vh; }
    .wrap { max-width: 1240px; margin: 0 auto; padding: 40px 24px; }
    
    /* Kopiraj kompletan CSS stil iz index.html ovdje da bi bio identičan */
    .contact-card { background: var(--panel); border: 1px solid var(--border); padding: 40px; border-radius: var(--radius2); max-width: 800px; margin: 0 auto; }
    .form-group { margin-bottom: 20px; }
    input, textarea { width: 100%; padding: 15px; background: #0a0f1d; border: 1px solid var(--border); border-radius: 12px; color: #fff; margin-top: 8px; }
    .btn-send { background: linear-gradient(90deg, var(--neon), var(--accent)); color: #000; padding: 15px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; width: 100%; }
  </style>
</head>

<body>
  <!-- Header i Navigacija moraju biti identični kao na index.html -->
  <div class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="index.html"><strong>YuGo Family TV</strong></a>
      <nav class="nav-inline">
        <a class="pill" href="index.html">Početna</a>
        <a class="pill primary" href="order.html">Naruči</a>
      </nav>
      <button class="menu-toggle" id="menuBtn">☰</button>
    </div>
  </div>

  <!-- Overlay (identičan kao u indexu) -->
  <div class="overlay" id="overlayNav">
    <div class="overlay-panel">
      <div class="overlay-top"><strong>Navigacija</strong><button class="closebtn" id="closeNavBtn">✕</button></div>
      <div class="overlay-grid">
        <a href="index.html">Početna</a>
        <a href="kontakt.html">Kontakt</a>
        <!-- Dodaj ostale linkove kao u indexu -->
      </div>
    </div>
  </div>

  <main class="wrap">
    <section>
      <div class="contact-card">
        <h1 style="color:var(--neon);">Kontaktirajte nas</h1>
        <p style="color:var(--muted);">Naš tim za podršku odgovara u roku od nekoliko minuta.</p>
        
        <form id="waForm">
          <div class="form-group">
            <label>Vaše ime</label>
            <input type="text" id="ime" required placeholder="Ime i prezime">
          </div>
          <div class="form-group">
            <label>Poruka</label>
            <textarea id="poruka" rows="5" required placeholder="Kako vam možemo pomoći?"></textarea>
          </div>
          <button type="submit" class="btn-send">Pošalji na WhatsApp</button>
        </form>
      </div>
    </section>
  </main>

  <script>
    // Logika za WhatsApp
    document.getElementById('waForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const name = document.getElementById('ime').value;
      const msg = document.getElementById('poruka').value;
      window.open(`https://wa.me/4915755749502?text=Pozdrav, ja sam ${encodeURIComponent(name)}. Upit: ${encodeURIComponent(msg)}`);
    });

    // Skripte za meni (isti kao u index.html)
    document.getElementById("menuBtn").onclick = () => document.getElementById("overlayNav").classList.add("open");
    document.getElementById("closeNavBtn").onclick = () => document.getElementById("overlayNav").classList.remove("open");
  </script>
</body>
</html>
